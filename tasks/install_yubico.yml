---
- name: Get latest Yubico release info
  uri:
    url: https://api.github.com/repos/Yubico/yubioath-flutter/releases/latest
    return_content: true
  register: json_response

- name: Set version fact
  set_fact:
    yubico_version: "{{ json_response.json.tag_name | regex_replace('^v', '') }}"
    yubico_tarball_url: "{{ json_response.json.assets | selectattr('name', 'search', 'linux.*\\.tar\\.gz') | map(attribute='browser_download_url') | first }}"

- name: Check if current version is already installed
  stat:
    path: "/opt/yubico/yubico-authenticator-{{ yubico_version }}-linux"
  register: yubico_install_dir

- name: Make yubico dir
  become: true
  file:
    path: /opt/yubico
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Download Yubico Authenticator tarball
  become: true
  get_url:
    url: "{{ yubico_tarball_url }}"
    dest: "/opt/yubico-authenticator-{{ yubico_version }}-linux.tar.gz"
  when: not yubico_install_dir.stat.exists

- name: Extract Yubico tarball
  become: true
  unarchive:
    src: "/opt/yubico-authenticator-{{ yubico_version }}-linux.tar.gz"
    dest: /opt/yubico
    remote_src: true
  when: not yubico_install_dir.stat.exists

- name: Run desktop integration script
  become: true
  command: "/opt/yubico/yubico-authenticator-{{ yubico_version }}-linux/desktop_integration.sh --install"
  when: not yubico_install_dir.stat.exists
  changed_when: true

- name: Clean up tarball
  become: true
  file:
    path: "/opt/yubico-authenticator-{{ yubico_version }}-linux.tar.gz"
    state: absent

- name: Find old Yubico install directories
  become: true
  find:
    paths: /opt/yubico
    file_type: directory
    patterns: "yubico-authenticator-*"
    excludes: "yubico-authenticator-{{ yubico_version }}-linux"
  register: old_yubico_dirs

- name: Remove old Yubico install directories
  become: true
  file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ old_yubico_dirs.files }}"
